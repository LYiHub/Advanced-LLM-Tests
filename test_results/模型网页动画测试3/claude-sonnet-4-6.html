<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汽车变速箱工作原理 3D 演示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    color: #e0f0ff;
  }
  #canvas-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  #ui-panel {
    position: fixed;
    top: 20px; right: 20px;
    width: 280px;
    background: rgba(0, 15, 35, 0.75);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(0, 180, 255, 0.3);
    border-radius: 16px;
    padding: 22px 20px;
    z-index: 10;
    box-shadow: 0 0 30px rgba(0,150,255,0.15), inset 0 0 20px rgba(0,100,200,0.05);
  }
  #ui-panel h2 {
    font-size: 15px;
    letter-spacing: 3px;
    color: #00cfff;
    text-transform: uppercase;
    margin-bottom: 18px;
    text-align: center;
    text-shadow: 0 0 10px #00cfff88;
    border-bottom: 1px solid rgba(0,180,255,0.2);
    padding-bottom: 12px;
  }
  .section-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: #7ab8d4;
    text-transform: uppercase;
    margin-bottom: 8px;
    margin-top: 16px;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .slider-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(to right, #00cfff, #0050aa);
    outline: none;
    cursor: pointer;
  }
  .slider-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #00cfff;
    box-shadow: 0 0 8px #00cfff;
    cursor: pointer;
    border: 2px solid #fff;
  }
  .slider-val {
    font-size: 13px;
    color: #00cfff;
    min-width: 48px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .gear-buttons {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .gear-btn {
    flex: 1;
    min-width: 42px;
    padding: 9px 4px;
    background: rgba(0,80,150,0.3);
    border: 1px solid rgba(0,180,255,0.3);
    border-radius: 8px;
    color: #a0d4ef;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
  }
  .gear-btn:hover {
    background: rgba(0,150,255,0.35);
    border-color: #00cfff;
    color: #fff;
    box-shadow: 0 0 10px rgba(0,200,255,0.3);
  }
  .gear-btn.active {
    background: rgba(0,180,255,0.35);
    border-color: #00cfff;
    color: #00ffee;
    box-shadow: 0 0 14px rgba(0,220,255,0.5);
    text-shadow: 0 0 8px #00ffee;
  }
  .gear-btn.reverse.active {
    background: rgba(255,60,60,0.3);
    border-color: #ff4444;
    color: #ff8888;
    box-shadow: 0 0 14px rgba(255,80,80,0.5);
    text-shadow: 0 0 8px #ff8888;
  }
  .hud-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 6px;
  }
  .hud-card {
    background: rgba(0,40,80,0.5);
    border: 1px solid rgba(0,150,255,0.2);
    border-radius: 10px;
    padding: 10px 10px 8px;
    text-align: center;
  }
  .hud-card .hud-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: #5a9abf;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .hud-card .hud-value {
    font-size: 18px;
    font-weight: 700;
    color: #00ffcc;
    text-shadow: 0 0 8px #00ffcc88;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .hud-card .hud-unit {
    font-size: 9px;
    color: #4a8aaf;
    margin-top: 3px;
  }
  .hud-card.wide {
    grid-column: span 2;
  }
  #clutch-bar-wrap {
    margin-top: 12px;
  }
  #clutch-bar-bg {
    height: 6px;
    background: rgba(0,60,100,0.5);
    border-radius: 3px;
    margin-top: 4px;
    overflow: hidden;
    border: 1px solid rgba(0,150,255,0.2);
  }
  #clutch-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, #ff6600, #ffcc00, #00ff99);
    border-radius: 3px;
    transition: width 0.05s;
  }
  #status-text {
    font-size: 10px;
    color: #7ab8d4;
    text-align: center;
    margin-top: 10px;
    letter-spacing: 1px;
    min-height: 15px;
  }
  #title-bar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,10,25,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,180,255,0.25);
    border-radius: 30px;
    padding: 8px 28px;
    font-size: 15px;
    letter-spacing: 4px;
    color: #00cfff;
    text-shadow: 0 0 12px #00cfff66;
    z-index: 10;
    white-space: nowrap;
  }
  #hint {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(100,180,255,0.5);
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="title-bar">⚙ 汽车变速箱工作原理 3D 演示</div>

<div id="ui-panel">
  <h2>控制面板</h2>

  <div class="section-label">发动机转速</div>
  <div class="slider-row">
    <input type="range" id="rpmSlider" min="600" max="6000" value="2000" step="50">
    <span class="slider-val" id="rpmVal">2000</span>
  </div>

  <div class="section-label">挡位选择</div>
  <div class="gear-buttons">
    <div class="gear-btn" data-gear="N" id="btn-N">N</div>
    <div class="gear-btn" data-gear="1" id="btn-1">1</div>
    <div class="gear-btn" data-gear="2" id="btn-2">2</div>
    <div class="gear-btn" data-gear="3" id="btn-3">3</div>
    <div class="gear-btn reverse" data-gear="R" id="btn-R">R</div>
  </div>

  <div class="section-label">实时数据 HUD</div>
  <div class="hud-grid">
    <div class="hud-card">
      <div class="hud-label">传动比</div>
      <div class="hud-value" id="hud-ratio">—</div>
      <div class="hud-unit">RATIO</div>
    </div>
    <div class="hud-card">
      <div class="hud-label">离合器</div>
      <div class="hud-value" id="hud-clutch">分离</div>
      <div class="hud-unit">CLUTCH</div>
    </div>
    <div class="hud-card">
      <div class="hud-label">输入 RPM</div>
      <div class="hud-value" id="hud-input-rpm">2000</div>
      <div class="hud-unit">RPM</div>
    </div>
    <div class="hud-card">
      <div class="hud-label">输出 RPM</div>
      <div class="hud-value" id="hud-output-rpm">0</div>
      <div class="hud-unit">RPM</div>
    </div>
    <div class="hud-card wide">
      <div class="hud-label">挡位状态</div>
      <div class="hud-value" id="hud-gear" style="font-size:22px;color:#00cfff;text-shadow:0 0 10px #00cfff88;">空挡 N</div>
      <div class="hud-unit">GEAR POSITION</div>
    </div>
  </div>

  <div id="clutch-bar-wrap">
    <div class="section-label" style="margin-top:10px;">离合器接合度</div>
    <div id="clutch-bar-bg"><div id="clutch-bar-fill"></div></div>
  </div>

  <div id="status-text">系统就绪</div>
</div>

<div id="hint">🖱 拖拽旋转 · 滚轮缩放 · 右键平移</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ============================================================
//  汽车变速箱 3D 演示 - 核心逻辑
// ============================================================

// ---- 场景初始化 ----
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020810);
scene.fog = new THREE.FogExp2(0x020810, 0.035);

const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 7, 16);
camera.lookAt(0, 0, 0);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 5;
controls.maxDistance = 40;
controls.target.set(0, 0.5, 0);

// ---- 光源 ----
const ambientLight = new THREE.AmbientLight(0x112244, 1.2);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0x88ccff, 2.5);
dirLight.position.set(8, 14, 8);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 60;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

const pointLight1 = new THREE.PointLight(0x00aaff, 3, 20);
pointLight1.position.set(-4, 4, 2);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xff4400, 2, 15);
pointLight2.position.set(4, 3, -2);
scene.add(pointLight2);

const rimLight = new THREE.PointLight(0x00ffcc, 1.5, 25);
rimLight.position.set(0, 8, -10);
scene.add(rimLight);

// ---- 地面网格 ----
const gridHelper = new THREE.GridHelper(40, 40, 0x003366, 0x001833);
gridHelper.position.y = -2.5;
scene.add(gridHelper);

const floorGeo = new THREE.PlaneGeometry(40, 40);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x010a18, metalness: 0.1, roughness: 0.9, transparent: true, opacity: 0.7
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -2.5;
floor.receiveShadow = true;
scene.add(floor);

// ============================================================
//  工具函数：创建齿轮
// ============================================================
function createGear(options) {
  const {
    teethCount = 16,
    innerRadius = 0.6,
    outerRadius = 1.0,
    toothHeight = 0.18,
    toothWidth = 0.22,
    thickness = 0.35,
    color = 0x4488cc,
    emissive = 0x001122,
    metalness = 0.85,
    roughness = 0.2,
    wireframe = false,
    opacity = 1.0
  } = options;

  const group = new THREE.Group();

  // 齿轮主体（圆柱）
  const bodyGeo = new THREE.CylinderGeometry(innerRadius, innerRadius, thickness, teethCount * 2, 1);
  const mat = new THREE.MeshStandardMaterial({
    color, emissive, metalness, roughness,
    transparent: opacity < 1,
    opacity,
    side: THREE.DoubleSide
  });
  const body = new THREE.Mesh(bodyGeo, mat);
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  // 线框叠加
  if (wireframe) {
    const wfMat = new THREE.MeshBasicMaterial({ color: 0x00aaff, wireframe: true, transparent: true, opacity: 0.15 });
    const wfMesh = new THREE.Mesh(bodyGeo.clone(), wfMat);
    group.add(wfMesh);
  }

  // 轮齿
  const toothGeo = new THREE.BoxGeometry(toothWidth, thickness, toothHeight);
  for (let i = 0; i < teethCount; i++) {
    const angle = (i / teethCount) * Math.PI * 2;
    const toothMesh = new THREE.Mesh(toothGeo, mat);
    const r = innerRadius + toothHeight / 2;
    toothMesh.position.set(
      Math.cos(angle) * r,
      0,
      Math.sin(angle) * r
    );
    toothMesh.rotation.y = -angle;
    toothMesh.castShadow = true;
    group.add(toothMesh);
  }

  // 中心孔装饰（辐条）
  const spokeCount = 4;
  for (let i = 0; i < spokeCount; i++) {
    const angle = (i / spokeCount) * Math.PI * 2;
    const spokeGeo = new THREE.BoxGeometry(0.08, thickness * 0.95, innerRadius * 0.82);
    const spoke = new THREE.Mesh(spokeGeo, new THREE.MeshStandardMaterial({
      color: 0x335577, metalness: 0.9, roughness: 0.3,
      transparent: opacity < 1, opacity: opacity * 0.9
    }));
    spoke.rotation.y = angle;
    spoke.castShadow = true;
    group.add(spoke);
  }

  return group;
}

// ============================================================
//  工具函数：创建轴（带纹理感）
// ============================================================
function createShaft(radiusTop, radiusBottom, height, color, emissive) {
  const group = new THREE.Group();
  const geo = new THREE.CylinderGeometry(radiusTop, radiusBottom, height, 32, 8);
  const mat = new THREE.MeshStandardMaterial({
    color, emissive: emissive || 0x000000, metalness: 0.9, roughness: 0.2
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  group.add(mesh);

  // 线框装饰
  const wfMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(color).lerp(new THREE.Color(0xffffff), 0.7), wireframe: true, transparent: true, opacity: 0.08 });
  const wfMesh = new THREE.Mesh(geo.clone(), wfMat);
  group.add(wfMesh);

  return group;
}

// ============================================================
//  工具函数：创建轴承座
// ============================================================
function createBearing(radius, color) {
  const group = new THREE.Group();
  const torusGeo = new THREE.TorusGeometry(radius, 0.12, 10, 32);
  const mat = new THREE.MeshStandardMaterial({ color, metalness: 0.95, roughness: 0.15 });
  const torus = new THREE.Mesh(torusGeo, mat);
  torus.rotation.x = Math.PI / 2;
  torus.castShadow = true;
  group.add(torus);
  return group;
}

// ============================================================
//  创建变速箱壳体（透明线框）
// ============================================================
function createHousing() {
  const group = new THREE.Group();
  const geo = new THREE.BoxGeometry(12, 4.5, 5);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x003366, metalness: 0.4, roughness: 0.6,
    transparent: true, opacity: 0.08,
    side: THREE.DoubleSide
  });
  const mesh = new THREE.Mesh(geo, mat);
  group.add(mesh);

  const edgesGeo = new THREE.EdgesGeometry(geo);
  const edgesMat = new THREE.LineBasicMaterial({ color: 0x004488, transparent: true, opacity: 0.4 });
  const edges = new THREE.LineSegments(edgesGeo, edgesMat);
  group.add(edges);
  return group;
}

// ============================================================
//  创建离合器组件
// ============================================================
function createClutch() {
  const group = new THREE.Group();

  // 飞轮盘
  const flywheelGeo = new THREE.CylinderGeometry(1.0, 1.0, 0.18, 32);
  const flywheelMat = new THREE.MeshStandardMaterial({ color: 0xcc3300, emissive: 0x330800, metalness: 0.8, roughness: 0.3 });
  const flywheel = new THREE.Mesh(flywheelGeo, flywheelMat);
  flywheel.castShadow = true;
  group.add(flywheel);

  // 离合器片
  const discGeo = new THREE.CylinderGeometry(0.85, 0.85, 0.1, 28);
  const discMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.3, roughness: 0.8, transparent: true, opacity: 0.9 });
  const disc = new THREE.Mesh(discGeo, discMat);
  disc.position.y = 0.2;
  disc.castShadow = true;
  group.add(disc);

  group.userData = { disc, flywheelMat };
  return group;
}

// ============================================================
//  场景组件构建
// ============================================================
const gearboxGroup = new THREE.Group();
scene.add(gearboxGroup);

// 变速箱壳体
const housing = createHousing();
housing.position.set(0, 0, 0);
gearboxGroup.add(housing);

// ---- 输入轴（红色）----
const inputShaft = createShaft(0.22, 0.22, 11, 0xff3311, 0x330800);
inputShaft.rotation.z = Math.PI / 2;
inputShaft.position.set(0, 0.6, 0);
gearboxGroup.add(inputShaft);

// 输入轴轴承
const bearingL = createBearing(0.35, 0x888888);
bearingL.position.set(-5.2, 0.6, 0);
gearboxGroup.add(bearingL);
const bearingR = createBearing(0.35, 0x888888);
bearingR.position.set(5.2, 0.6, 0);
gearboxGroup.add(bearingR);

// ---- 输出轴（蓝青色）----
const outputShaft = createShaft(0.20, 0.20, 11, 0x00ccdd, 0x003344);
outputShaft.rotation.z = Math.PI / 2;
outputShaft.position.set(0, -1.2, 0);
gearboxGroup.add(outputShaft);

const bearingL2 = createBearing(0.32, 0x666688);
bearingL2.position.set(-5.2, -1.2, 0);
gearboxGroup.add(bearingL2);
const bearingR2 = createBearing(0.32, 0x666688);
bearingR2.position.set(5.2, -1.2, 0);
gearboxGroup.add(bearingR2);

// ---- 离合器 ----
const clutchGroup = createClutch();
clutchGroup.rotation.z = Math.PI / 2;
clutchGroup.position.set(-4.5, 0.6, 0);
gearboxGroup.add(clutchGroup);

// ---- 齿轮组配置 ----
// 各挡位：主动齿轮在输入轴，从动齿轮在输出轴
// 传动比 = 从动齿数 / 主动齿数
const gearConfigs = [
  // { inputTeeth, outputTeeth, inputRadius, outputRadius, xPos, ratio, label }
  { inputTeeth: 10, outputTeeth: 30, inputRadius: 0.55, outputRadius: 1.45, xPos: -2.5, ratio: 3.0, label: '一挡', gearId: 1 },
  { inputTeeth: 14, outputTeeth: 28, inputRadius: 0.72, outputRadius: 1.30, xPos: 0.0,  ratio: 2.0, label: '二挡', gearId: 2 },
  { inputTeeth: 20, outputTeeth: 20, inputRadius: 1.00, outputRadius: 1.00, xPos: 2.5,  ratio: 1.0, label: '三挡', gearId: 3 },
];

// 倒挡惰轮
const reverseConfig = {
  inputTeeth: 12, outputTeeth: 12, idlerTeeth: 12,
  inputRadius: 0.65, outputRadius: 0.65, idlerRadius: 0.65,
  xPos: -4.5, ratio: -1.5, label: '倒挡', gearId: 'R'
};

// 存储齿轮组对象
const gearPairs = [];
const inputGears = [];
const outputGears = [];

// Y轴间距：输入轴Y=0.6, 输出轴Y=-1.2, 间距=1.8
const axisGap = 1.8;

gearConfigs.forEach(cfg => {
  const pivotInput = new THREE.Group();
  const pivotOutput = new THREE.Group();

  const gInput = createGear({
    teethCount: cfg.inputTeeth,
    innerRadius: cfg.inputRadius * 0.72,
    thickness: 0.45,
    toothHeight: cfg.inputRadius * 0.22,
    color: 0xdd2200,
    emissive: 0x220500,
    metalness: 0.85,
    roughness: 0.2,
    wireframe: true
  });
  gInput.rotation.x = Math.PI / 2;
  pivotInput.add(gInput);
  pivotInput.position.set(cfg.xPos, 0.6, 0);
  gearboxGroup.add(pivotInput);

  const gOutput = createGear({
    teethCount: cfg.outputTeeth,
    innerRadius: cfg.outputRadius * 0.72,
    thickness: 0.45,
    toothHeight: cfg.outputRadius * 0.22,
    color: 0x0088aa,
    emissive: 0x001122,
    metalness: 0.85,
    roughness: 0.2,
    wireframe: true
  });
  gOutput.rotation.x = Math.PI / 2;
  pivotOutput.add(gOutput);
  pivotOutput.position.set(cfg.xPos, -1.2, 0);
  gearboxGroup.add(pivotOutput);

  gearPairs.push({ cfg, pivotInput, pivotOutput, gInput, gOutput, active: false, engagedZ: 0, disengagedZ: 1.8 });
  inputGears.push(pivotInput);
  outputGears.push(pivotOutput);
});

// ---- 倒挡组 ----
const reversePivotInput = new THREE.Group();
const reversePivotIdler = new THREE.Group();
const reversePivotOutput = new THREE.Group();

const rGInput = createGear({
  teethCount: reverseConfig.inputTeeth,
  innerRadius: 0.45, thickness: 0.4, toothHeight: 0.15,
  color: 0xdd2200, emissive: 0x220500, metalness: 0.85, roughness: 0.2, wireframe: true
});
rGInput.rotation.x = Math.PI / 2;
reversePivotInput.add(rGInput);
reversePivotInput.position.set(reverseConfig.xPos, 0.6, 0);
gearboxGroup.add(reversePivotInput);

const rGIdler = createGear({
  teethCount: reverseConfig.idlerTeeth,
  innerRadius: 0.45, thickness: 0.4, toothHeight: 0.15,
  color: 0xffaa00, emissive: 0x221100, metalness: 0.8, roughness: 0.25, wireframe: true
});
rGIdler.rotation.x = Math.PI / 2;
reversePivotIdler.add(rGIdler);
// 惰轮悬挂在两轴中间
reversePivotIdler.position.set(reverseConfig.xPos, -0.3, 1.2);
gearboxGroup.add(reversePivotIdler);

const rGOutput = createGear({
  teethCount: reverseConfig.outputTeeth,
  innerRadius: 0.45, thickness: 0.4, toothHeight: 0.15,
  color: 0x0088aa, emissive: 0x001122, metalness: 0.85, roughness: 0.2, wireframe: true
});
rGOutput.rotation.x = Math.PI / 2;
reversePivotOutput.add(rGOutput);
reversePivotOutput.position.set(reverseConfig.xPos, -1.2, 0);
gearboxGroup.add(reversePivotOutput);

// ---- 同步器（滑套）----
const syncGroups = [];
gearConfigs.forEach((cfg, i) => {
  const syncGeo = new THREE.CylinderGeometry(0.32, 0.32, 0.35, 20);
  const syncMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0x332200, metalness: 0.9, roughness: 0.2 });
  const sync = new THREE.Mesh(syncGeo, syncMat);
  sync.rotation.z = Math.PI / 2;
  sync.position.set(cfg.xPos, 0.6, 0);
  sync.castShadow = true;
  gearboxGroup.add(sync);
  syncGroups.push(sync);
});

// 倒挡同步器
const revSyncGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.3, 16);
const revSyncMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0x221100, metalness: 0.9, roughness: 0.2 });
const revSync = new THREE.Mesh(revSyncGeo, revSyncMat);
revSync.rotation.z = Math.PI / 2;
revSync.position.set(reverseConfig.xPos, 0.6, 0);
gearboxGroup.add(revSync);

// ---- 啮合连接线（可视化辅助）----
const meshingLines = [];
function createMeshingLine(x, y1, y2) {
  const pts = [new THREE.Vector3(x, y1, 0), new THREE.Vector3(x, y2, 0)];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.0 });
  const line = new THREE.Line(geo, mat);
  gearboxGroup.add(line);
  return { line, mat };
}
gearConfigs.forEach(cfg => {
  meshingLines.push(createMeshingLine(cfg.xPos, 0.6, -1.2));
});
meshingLines.push(createMeshingLine(reverseConfig.xPos, 0.6, -1.2));

// ---- 粒子特效（接合时的火花）----
const sparkParticles = [];
function createSparks(x, y) {
  const count = 20;
  const positions = new Float32Array(count * 3);
  const velocities = [];
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const speed = 0.05 + Math.random() * 0.1;
    velocities.push({ vx: Math.cos(a) * speed, vy: (Math.random() - 0.3) * speed, vz: Math.sin(a) * speed, life: 1.0 });
    positions[i * 3] = x;
    positions[i * 3 + 1] = y;
    positions[i * 3 + 2] = 0;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color: 0xffaa00, size: 0.08, transparent: true, opacity: 1.0 });
  const pts = new THREE.Points(geo, mat);
  gearboxGroup.add(pts);
  sparkParticles.push({ pts, velocities, life: 1.0 });
}

// ============================================================
//  状态机
// ============================================================
const GEARS = {
  N: { ratio: null,  label: '空挡 N',  direction: 1 },
  1: { ratio: 3.0,   label: '一挡 1',  direction: 1 },
  2: { ratio: 2.0,   label: '二挡 2',  direction: 1 },
  3: { ratio: 1.0,   label: '三挡 3',  direction: 1 },
  R: { ratio: 2.0,   label: '倒挡 R',  direction: -1 },
};

let state = {
  currentGear: 'N',
  targetGear: 'N',
  engineRPM: 2000,
  outputRPM: 0,
  clutchEngagement: 0,       // 0~1
  isShifting: false,
  shiftProgress: 0,
  inputRotation: 0,
  outputRotation: 0,
  gearRotations: [0, 0, 0],
  reverseRotation: 0,
  idlerRotation: 0,
};

let prevTime = performance.now();

// ============================================================
//  换挡逻辑
// ============================================================
function shiftTo(gear) {
  if (gear === state.targetGear && !state.isShifting) return;
  state.targetGear = gear;
  state.isShifting = true;
  state.shiftProgress = 0;
  state.clutchEngagement = 0;
  updateGearButtons(gear);
  document.getElementById('status-text').textContent = `正在换入 ${GEARS[gear].label}...`;
  // 触发火花特效
  const gearIndex = ['1','2','3'].indexOf(gear);
  if (gearIndex >= 0) createSparks(gearConfigs[gearIndex].xPos, 0.6);
  if (gear === 'R') createSparks(reverseConfig.xPos, 0.6);
}

function updateGearButtons(gear) {
  ['N','1','2','3','R'].forEach(g => {
    const btn = document.getElementById('btn-' + g);
    btn.classList.toggle('active', g === gear);
  });
}

// ============================================================
//  初始挡位
// ============================================================
updateGearButtons('N');

// ============================================================
//  主更新循环
// ============================================================
function updateSimulation(dt) {
  const engineRPM = state.engineRPM;
  const curGear = GEARS[state.currentGear];
  const tgtGear = GEARS[state.targetGear];

  // ---- 换挡过渡 ----
  if (state.isShifting) {
    state.shiftProgress += dt * 1.2; // 换挡速度
    const t = Math.min(state.shiftProgress, 1.0);

    // 前半段：分离离合器，脱出旧挡
    // 后半段：接合新挡，接合离合器
    if (t < 0.5) {
      state.clutchEngagement = 1.0 - t * 2;
    } else {
      state.clutchEngagement = (t - 0.5) * 2;
      if (t >= 0.98) {
        // 换挡完成
        state.currentGear = state.targetGear;
        state.isShifting = false;
        state.clutchEngagement = state.currentGear === 'N' ? 0 : 1.0;
        const gLabel = GEARS[state.currentGear].label;
        document.getElementById('status-text').textContent = `${gLabel} 已接合`;
      }
    }

    // 同步器轴向位移动画
    updateSynchronizerPositions(t, state.targetGear);
  } else {
    state.clutchEngagement = state.currentGear === 'N' ? 0 : 1.0;
  }

  // ---- 转速计算 ----
  const inputAngularVel = (engineRPM / 60) * Math.PI * 2; // rad/s
  let outputAngularVel = 0;

  const activeGear = state.isShifting ? state.targetGear : state.currentGear;
  const activeGearData = GEARS[activeGear];

  if (activeGear !== 'N' && activeGearData.ratio) {
    outputAngularVel = (inputAngularVel / activeGearData.ratio) * activeGearData.direction * state.clutchEngagement;
  }

  // ---- 旋转累积 ----
  state.inputRotation += inputAngularVel * dt;
  state.outputRotation += outputAngularVel * dt;

  // 各挡位齿轮自转
  gearConfigs.forEach((cfg, i) => {
    const inputGearVel = inputAngularVel;
    const outputGearVel = inputGearVel * (cfg.inputTeeth / cfg.outputTeeth);
    state.gearRotations[i] = (state.gearRotations[i] || 0) + inputGearVel * dt;

    // 从动齿轮反向（真实齿轮啮合）
    const g = gearPairs[i];
    if (g.pivotInput) g.pivotInput.rotation.y = state.gearRotations[i];
    if (g.pivotOutput) g.pivotOutput.rotation.y = -outputGearVel * (state.gearRotations[i] / inputGearVel);
  });

  // 倒挡齿轮
  state.reverseRotation += inputAngularVel * dt;
  reversePivotInput.rotation.y = state.reverseRotation;
  reversePivotIdler.rotation.y = -state.reverseRotation;
  reversePivotOutput.rotation.y = state.reverseRotation; // 经惰轮后同向=反向

  // 输入轴自转
  inputShaft.rotation.y = state.inputRotation;
  // 输出轴
  outputShaft.rotation.y = state.outputRotation;
  // 离合器
  clutchGroup.rotation.y = state.inputRotation;

  // 离合器碟片缩放模拟接合
  const disc = clutchGroup.userData.disc;
  if (disc) {
    const engScale = 0.85 + state.clutchEngagement * 0.15;
    disc.scale.set(engScale, 1, engScale);
    disc.material.opacity = 0.4 + state.clutchEngagement * 0.6;
    disc.position.y = 0.2 - state.clutchEngagement * 0.12;
  }

  // ---- 啮合连接线透明度 ----
  meshingLines.forEach((ml, i) => {
    const isActive = (i < 3) ? (activeGear === String(i + 1)) : (activeGear === 'R');
    const targetOpacity = isActive ? (0.3 + state.clutchEngagement * 0.6) : 0;
    ml.mat.opacity += (targetOpacity - ml.mat.opacity) * Math.min(dt * 5, 1);
  });

  // ---- 输出RPM计算 ----
  let outRPM = 0;
  if (activeGear !== 'N' && activeGearData.ratio) {
    outRPM = Math.abs((engineRPM / activeGearData.ratio) * state.clutchEngagement);
  }

  // ---- 更新HUD ----
  const ratioText = (activeGear !== 'N' && GEARS[activeGear]) ? GEARS[activeGear].ratio.toFixed(1) : '—';
  document.getElementById('hud-ratio').textContent = ratioText;
  document.getElementById('hud-clutch').textContent = state.clutchEngagement > 0.8 ? '接合' : state.clutchEngagement > 0.1 ? '过渡' : '分离';
  document.getElementById('hud-input-rpm').textContent = Math.round(engineRPM);
  document.getElementById('hud-output-rpm').textContent = Math.round(outRPM);
  document.getElementById('hud-gear').textContent = GEARS[activeGear]?.label || GEARS[state.currentGear]?.label || '空挡 N';
  document.getElementById('clutch-bar-fill').style.width = (state.clutchEngagement * 100) + '%';

  // ---- 粒子更新 ----
  for (let i = sparkParticles.length - 1; i >= 0; i--) {
    const sp = sparkParticles[i];
    sp.life -= dt * 1.5;
    if (sp.life <= 0) {
      gearboxGroup.remove(sp.pts);
      sparkParticles.splice(i, 1);
      continue;
    }
    const positions = sp.pts.geometry.attributes.position.array;
    sp.velocities.forEach((v, j) => {
      v.life -= dt * 2;
      if (v.life > 0) {
        positions[j * 3] += v.vx;
        positions[j * 3 + 1] += v.vy;
        positions[j * 3 + 2] += v.vz;
        v.vy -= 0.003;
      }
    });
    sp.pts.geometry.attributes.position.needsUpdate = true;
    sp.pts.material.opacity = sp.life;
  }
}

// ============================================================
//  同步器位移动画
// ============================================================
function updateSynchronizerPositions(t, targetGear) {
  const gearIndex = parseInt(targetGear) - 1;
  syncGroups.forEach((sync, i) => {
    let baseX = gearConfigs[i].xPos;
    if (i === gearIndex && targetGear !== 'N') {
      // 接合动画：Z轴轻微偏移模拟轴向移动
      const swing = Math.sin(t * Math.PI) * 0.3;
      sync.position.z = swing;
      sync.scale.setScalar(1.0 + Math.sin(t * Math.PI) * 0.15);
    } else {
      sync.position.z += (0 - sync.position.z) * 0.1;
      sync.scale.setScalar(1.0);
    }
  });
  if (targetGear === 'R') {
    const swing = Math.sin(t * Math.PI) * 0.3;
    revSync.position.z = swing;
    revSync.scale.setScalar(1.0 + Math.sin(t * Math.PI) * 0.15);
  } else {
    revSync.position.z += (0 - revSync.position.z) * 0.1;
    revSync.scale.setScalar(1.0);
  }
}

// ============================================================
//  动态光效
// ============================================================
let lightTime = 0;
function updateLights(dt) {
  lightTime += dt;
  pointLight1.intensity = 2.5 + Math.sin(lightTime * 2.3) * 0.4;
  pointLight2.intensity = 1.8 + Math.sin(lightTime * 1.7) * 0.3;
  const activeGear = state.isShifting ? state.targetGear : state.currentGear;
  if (activeGear === 'R') {
    pointLight2.color.setHex(0xff2200);
    pointLight2.intensity = 3.0 + Math.sin(lightTime * 4) * 0.8;
  } else if (activeGear === 'N') {
    pointLight2.color.setHex(0x445566);
    pointLight2.intensity = 0.8;
  } else {
    pointLight2.color.setHex(0xff4400);
    pointLight2.intensity = 2.0 + state.clutchEngagement * 1.5;
  }
}

// ============================================================
//  渲染循环
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - prevTime) / 1000, 0.05);
  prevTime = now;

  controls.update();
  updateSimulation(dt);
  updateLights(dt);

  renderer.render(scene, camera);
}
animate();

// ============================================================
//  UI 事件绑定
// ============================================================
const rpmSlider = document.getElementById('rpmSlider');
const rpmVal = document.getElementById('rpmVal');
rpmSlider.addEventListener('input', () => {
  state.engineRPM = parseInt(rpmSlider.value);
  rpmVal.textContent = state.engineRPM;
  document.getElementById('hud-input-rpm').textContent = state.engineRPM;
});

['N','1','2','3','R'].forEach(g => {
  document.getElementById('btn-' + g).addEventListener('click', () => {
    shiftTo(g);
  });
});

// ============================================================
//  响应式窗口
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
//  初始化显示
// ============================================================
document.getElementById('hud-gear').textContent = '空挡 N';
document.getElementById('hud-ratio').textContent = '—';
document.getElementById('hud-clutch').textContent = '分离';
document.getElementById('hud-input-rpm').textContent = '2000';
document.getElementById('hud-output-rpm').textContent = '0';
document.getElementById('status-text').textContent = '请选择挡位开始演示';
updateGearButtons('N');
</script>
</body>
